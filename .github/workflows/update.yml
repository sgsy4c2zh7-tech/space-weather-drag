name: SPACE WEATHER DRAG BASIC

on:
  workflow_dispatch:
  schedule:
    - cron: "10 */3 * * *"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy scipy sgp4 skyfield pymsis

      - name: Prepare folders
        run: |
          mkdir -p docs/data
          mkdir -p docs/data/catalog
          mkdir -p docs/data/sat_history
          mkdir -p docs/data/noaa

      - name: Fetch NOAA data
        run: python scripts/fetch_noaa.py

      - name: Build satellite histories
        run: python scripts/build_sat_history.py

      - name: Show generated counts
        run: |
          echo "sat_history json count:"
          find docs/data/sat_history -maxdepth 1 -name "*.json" | wc -l

          echo "noaa files:"
          find docs/data/noaa -maxdepth 1 -type f | sort

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Update satellite histories and NOAA data" || echo "No changes to commit"
          git push
