name: Update Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare folders
        run: |
          mkdir -p docs
          mkdir -p docs/data
          mkdir -p docs/data/noaa
          mkdir -p scripts

      - name: Fetch NOAA data
        run: python scripts/fetch_noaa.py

      - name: Build satellite history
        run: python scripts/build_history.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Update satellite and NOAA data" || echo "No changes to commit"
          git push
