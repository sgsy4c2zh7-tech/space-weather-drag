name: FULL REBUILD SAT HISTORY

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare folders
        run: |
          mkdir -p docs/data
          mkdir -p docs/data/catalog
          mkdir -p docs/data/sat_history
          mkdir -p docs/data/noaa
          mkdir -p scripts

      - name: Clean old sat_history json
        run: |
          find docs/data/sat_history -maxdepth 1 -name "*.json" ! -name ".gitkeep" -delete || true

      - name: Fetch full CelesTrak catalog snapshot
        run: python scripts/fetch_catalog.py

      - name: Build 30-day satellite histories
        run: python scripts/build_sat_history.py

      - name: Fetch NOAA data
        run: python scripts/fetch_noaa.py

      - name: Debug generated files
        run: |
          echo "===== catalog files ====="
          find docs/data/catalog -maxdepth 1 -name "*.json" | sort | tail -5

          echo "===== sat_history count ====="
          find docs/data/sat_history -maxdepth 1 -name "*.json" | wc -l

          echo "===== sat_history sample ====="
          find docs/data/sat_history -maxdepth 1 -name "*.json" | sort | head -20

          test $(find docs/data/sat_history -maxdepth 1 -name "*.json" | wc -l) -gt 100 || (echo "sat_history generation failed or too few files" && exit 1)

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "Full rebuild satellite histories and NOAA data" || echo "No changes to commit"
          git push
