<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Space Weather Drag</title>
</head>
<body>

<h1>Satellite Viewer</h1>

<input id="norad" value="25544">
<button onclick="loadData()">表示</button>

<pre id="out">ここにデータが出る</pre>

<script>
async function loadData() {
  const id = document.getElementById("norad").value;

  const res = await fetch(`data/${id}.json`);
  const data = await res.json();

  document.getElementById("out").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
