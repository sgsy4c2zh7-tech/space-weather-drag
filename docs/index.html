<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>space-weather-drag</title>
</head>
<body>
  <h1>space-weather-drag</h1>
  <p>ここまで見えれば反映OK</p>

  <input id="norad" placeholder="NORAD IDを入力">
  <button onclick="loadData()">表示</button>

  <pre id="out">まだ未読込</pre>

  <script>
    async function loadData() {
      const id = document.getElementById("norad").value.trim();
      if (!id) {
        document.getElementById("out").textContent = "NORAD IDを入力してください";
        return;
      }

      try {
        const res = await fetch(`data/${id}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        document.getElementById("out").textContent =
          JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("out").textContent =
          `読込失敗: ${e.message}`;
      }
    }
  </script>
</body>
</html>
