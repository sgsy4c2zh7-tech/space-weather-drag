<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Satellite Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Satellite Viewer</h1>

<input id="norad" value="25544">
<button onclick="loadData()">表示</button>

<canvas id="chart" width="800" height="400"></canvas>

<script>
let chart;

async function loadData() {
  const id = document.getElementById("norad").value;

  const res = await fetch(`data/${id}.json`);
  const data = await res.json();

  const labels = data.history.map(h => h.epoch);
  const apogee = data.history.map(h => h.apogee_km);
  const perigee = data.history.map(h => h.perigee_km);

  // 前のグラフ削除
  if (chart) {
    chart.destroy();
  }

  chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Apogee (km)',
          data: apogee,
          borderWidth: 2
        },
        {
          label: 'Perigee (km)',
          data: perigee,
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          title: {
            display: true,
            text: 'Altitude (km)'
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
