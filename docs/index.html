<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>space-weather-drag</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.5;
    }
    input, button {
      font-size: 16px;
      padding: 8px;
      margin-right: 8px;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>space-weather-drag</h1>
  <p>まずは JSON が読めるかだけ確認します。</p>

  <input id="norad" value="25544" placeholder="NORAD ID">
  <button id="loadBtn">読み込む</button>

  <p id="status">未実行</p>
  <pre id="out">ここに結果が出ます</pre>

  <script>
    async function loadData() {
      const id = document.getElementById("norad").value.trim();
      const status = document.getElementById("status");
      const out = document.getElementById("out");

      if (!id) {
        status.textContent = "NORAD IDを入力してください";
        return;
      }

      const url = "data/" + id + ".json";
      status.textContent = "読込中: " + url;
      out.textContent = "";

      try {
        const res = await fetch(url, { cache: "no-store" });
        status.textContent = "HTTP status: " + res.status;

        if (!res.ok) {
          out.textContent = "読込失敗: " + url;
          return;
        }

        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
        status.textContent = "成功: " + url;
      } catch (e) {
        status.textContent = "エラー発生";
        out.textContent = String(e);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadData);
  </script>
</body>
</html>
