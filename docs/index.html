<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Weather Drag Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      background: #0b1220;
      color: #e8eefc;
    }

    h1, h2 { margin-bottom: 10px; }

    .controls, .card {
      background: #131c2f;
      border: 1px solid #26324d;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    input, select, button {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #3d4d73;
      background: #0f1728;
      color: #fff;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    /* ⭐ これが重要：高さ固定 */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 420px;
    }

    .chart-wrap.small {
      height: 260px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      background: #fff;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid #31415f;
      padding: 6px;
    }

    th {
      background: #1a2740;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
    }
  </style>
</head>

<body>

<h1>Space Weather Drag Viewer</h1>

<div class="controls">
  <div class="row">
    <label>NORAD ID
      <input id="norad" value="25544">
    </label>

    <label>開始日
      <input id="startDate" type="date">
    </label>

    <label>終了日
      <input id="endDate" type="date">
    </label>

    <label>指数
      <select id="indexType">
        <option value="kp">Kp</option>
        <option value="ae">AE</option>
      </select>
    </label>

    <button onclick="loadData()">表示</button>
  </div>
</div>

<div class="grid">

  <div>
    <div class="card">
      <h2>衛星グラフ</h2>
      <div class="chart-wrap">
        <canvas id="orbitChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>指数グラフ</h2>
      <div class="chart-wrap small">
        <canvas id="indexChart"></canvas>
      </div>
    </div>
  </div>

  <div>
    <div class="card">
      <h2>最新軌道情報</h2>
      <table id="infoTable"></table>
    </div>
  </div>

</div>

<script>
let orbitChart = null;
let indexChart = null;

function setDefaultDates() {
  const today = new Date();
  const end = today.toISOString().slice(0,10);

  const startObj = new Date();
  startObj.setDate(startObj.getDate() - 30);

  document.getElementById("startDate").value = startObj.toISOString().slice(0,10);
  document.getElementById("endDate").value = end;
}

function withinRange(t, start, end) {
  const d = new Date(t);
  return d >= new Date(start) && d <= new Date(end);
}

async function loadData() {
  const id = document.getElementById("norad").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;
  const type = document.getElementById("indexType").value;

  const sat = await fetch(`data/${id}.json`).then(r => r.json());

  const hist = sat.history.filter(h => withinRange(h.epoch, start, end));

  const labels = hist.map(h => h.epoch);
  const apogee = hist.map(h => h.apogee_km);
  const perigee = hist.map(h => h.perigee_km);

  if (orbitChart) orbitChart.destroy();

  orbitChart = new Chart(document.getElementById("orbitChart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Apogee", data: apogee },
        { label: "Perigee", data: perigee }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

  // NOAA データ
  let indexData = [];

  if (type === "kp") {
    const obs = await fetch("data/noaa/kp_observed.json").then(r=>r.json());
    indexData = obs.data;
  } else {
    const ae = await fetch("data/noaa/ae_observed.json").then(r=>r.json());
    indexData = ae.data;
  }

  const idxFiltered = indexData.filter(d => withinRange(d.time_tag, start, end));

  if (indexChart) indexChart.destroy();

  indexChart = new Chart(document.getElementById("indexChart"), {
    type: "bar",
    data: {
      labels: idxFiltered.map(d=>d.time_tag),
      datasets: [{
        label: type,
        data: idxFiltered.map(d=>d.kp_index || d.ae_index)
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

  const latest = hist[hist.length - 1];

  document.getElementById("infoTable").innerHTML = `
    <tr><th>Apogee</th><td>${latest.apogee_km}</td></tr>
    <tr><th>Perigee</th><td>${latest.perigee_km}</td></tr>
    <tr><th>Inclination</th><td>${latest.inclination_deg}</td></tr>
  `;
}

setDefaultDates();
</script>

</body>
</html>
