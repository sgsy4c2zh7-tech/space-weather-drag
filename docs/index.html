<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Space Weather Drag</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Space Weather Drag Viewer</h1>

<input id="norad" placeholder="NORAD ID（例:25544）">
<button onclick="loadData()">表示</button>

<canvas id="chart" width="800" height="400"></canvas>

<script>
async function loadData() {
  const id = document.getElementById("norad").value;

  const res = await fetch(`data/${id}.json`);
  const data = await res.json();

  const labels = data.history.map(h => h.epoch);
  const apogee = data.history.map(h => h.apogee_km);
  const perigee = data.history.map(h => h.perigee_km);

  new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Apogee',
          data: apogee
        },
        {
          label: 'Perigee',
          data: perigee
        }
      ]
    }
  });
}
</script>

</body>
</html>
